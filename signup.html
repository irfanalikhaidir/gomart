<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — Gomart</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
    background: #fff;
}

.left {
    width: 460px;
    flex-shrink: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 56px;
    background: #fff;
    position: relative;
    z-index: 2;
    overflow-y: auto;
}

.logo-row {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; flex-shrink: 0;
}
.logo-row img { height: 100px; object-fit: contain; }

.steps-bar { display: flex; align-items: center; margin-bottom: 26px; }
.step-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.step-circle {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
    border: 2px solid #eee; background: #f5f5f5; color: #ccc;
    transition: all .35s ease; position: relative; z-index: 1;
}
.step-circle.active { background: linear-gradient(135deg,#f9a825,#e65c00); border-color: transparent; color: #fff; box-shadow: 0 4px 12px rgba(249,168,37,.4); }
.step-circle.done   { background: #e65c00; border-color: transparent; color: #fff; }
.step-circle.done span { display: none; }
.step-circle.done::after { content: ''; display: block; width: 8px; height: 5px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); }
.step-label { font-size: 9.5px; font-weight: 700; color: #ccc; letter-spacing: .05em; text-transform: uppercase; transition: color .3s; }
.step-item.active .step-label { color: #e67e00; }
.step-item.done   .step-label { color: #aaa; }
.step-line { flex: 1; height: 2px; background: #eee; margin-bottom: 13px; position: relative; overflow: hidden; }
.step-line::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg,#f9a825,#e65c00); transform: scaleX(0); transform-origin: left; transition: transform .5s ease; }
.step-line.filled::after { transform: scaleX(1); }

.step-heading h2 { font-size: 22px; font-weight: 900; color: #111; margin-bottom: 3px; letter-spacing: -.025em; }
.step-heading p  { font-size: 13px; color: #bbb; margin-bottom: 18px; }

.toast { display: none; background: rgba(220,50,50,.07); border: 1px solid rgba(220,50,50,.18); border-radius: 10px; padding: 9px 14px; font-size: 13px; color: #c0392b; margin-bottom: 12px; text-align: center; }
.toast.show { display: block; }

.field { margin-bottom: 13px; }
.field label { display: block; font-size: 10.5px; font-weight: 800; color: #aaa; margin-bottom: 5px; letter-spacing: .08em; text-transform: uppercase; }
.field input, .field select {
    width: 100%; padding: 12px 14px;
    background: #fafafa; border: 1.5px solid #eee;
    border-radius: 11px; font-size: 13.5px; color: #111; outline: none;
    font-family: Arial, sans-serif;
    transition: border-color .2s, box-shadow .2s, background .2s;
}
.field input::placeholder { color: #ccc; }
.field input:focus, .field select:focus { background: #fff; border-color: #f9a825; box-shadow: 0 0 0 4px rgba(249,168,37,.12); }
.field select { appearance: none; cursor: pointer; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 38px; }
.pw-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #ccc; padding: 0; transition: color .15s; }
.pw-eye:hover { color: #f9a825; }
.pw-strength { margin-top: 5px; display: none; }
.pw-strength.show { display: block; }
.sbars { display: flex; gap: 3px; margin-bottom: 3px; }
.sbar { flex: 1; height: 3px; border-radius: 3px; background: #eee; transition: background .3s; }
.sbar.weak { background: #ef4444; } .sbar.fair { background: #f97316; } .sbar.strong { background: #22c55e; }
.sbar-lbl { font-size: 10.5px; color: #bbb; }

.terms-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; }
.terms-row input[type="checkbox"] { margin-top: 2px; accent-color: #f9a825; flex-shrink: 0; width: 14px; height: 14px; cursor: pointer; }
.terms-row label { font-size: 11.5px; color: #bbb; line-height: 1.5; cursor: pointer; }
.terms-row label a { color: #f9a825; font-weight: 600; text-decoration: none; }

.btn-main {
    width: 100%; padding: 13px; border: none; border-radius: 12px;
    background: linear-gradient(135deg,#f9a825,#e65c00);
    color: #fff; font-size: 14.5px; font-weight: 800;
    cursor: pointer; transition: opacity .2s, transform .15s, box-shadow .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 10px; box-shadow: 0 4px 16px rgba(249,168,37,.35);
}
.btn-main:hover { opacity: .9; transform: translateY(-2px); }

.btn-google {
    width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 12px;
    background: #fff; color: #333; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .2s, box-shadow .2s, transform .15s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 10px;
}
.btn-google:hover { background: #f8f8f8; box-shadow: 0 2px 8px rgba(0,0,0,.1); transform: translateY(-1px); }
.btn-google svg { flex-shrink: 0; }

.divider { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }
.divider span { font-size: 11px; color: #ccc; font-weight: 600; letter-spacing: .06em; }

.btn-skip {
    width: 100%; padding: 11px; border: 1.5px solid #eee; border-radius: 11px;
    background: #fafafa; color: #bbb; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: background .2s, color .2s; margin-bottom: 10px;
}
.btn-skip:hover { background: #f0f0f0; color: #666; }
.spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
.btn-main.loading .btn-label { display: none; }
.btn-main.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.alt-row { text-align: center; font-size: 12.5px; color: #ccc; }
.alt-row a { color: #f9a825; font-weight: 700; text-decoration: none; }
.alt-row a:hover { text-decoration: underline; }

.step-panel { display: none; animation: fadeUp .4s ease both; }
.step-panel.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.type-opt { border: 1.5px solid #eee; border-radius: 11px; padding: 10px 8px; text-align: center; cursor: pointer; background: #fafafa; transition: all .2s; }
.type-opt:hover { border-color: #f9a825; background: #fff; }
.type-opt.selected { border-color: #e65c00; background: rgba(249,168,37,.07); box-shadow: 0 0 0 3px rgba(249,168,37,.15); }
.type-opt-icon { font-size: 18px; margin-bottom: 4px; }
.type-opt-label { font-size: 11px; font-weight: 700; color: #666; }

.success-wrap { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 14px 0; }
.success-icon { width: 68px; height: 68px; border-radius: 50%; background: linear-gradient(135deg,#f9a825,#e65c00); display: flex; align-items: center; justify-content: center; margin-bottom: 18px; box-shadow: 0 8px 24px rgba(249,168,37,.4); animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
.success-icon svg { width: 30px; height: 30px; }
@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.success-wrap h2 { font-size: 22px; font-weight: 900; color: #111; margin-bottom: 8px; }
.success-wrap p  { font-size: 13.5px; color: #aaa; line-height: 1.7; max-width: 280px; margin-bottom: 22px; }
.btn-dashboard { display: inline-flex; align-items: center; gap: 8px; padding: 13px 30px; border-radius: 50px; background: linear-gradient(135deg,#f9a825,#e65c00); color: #fff; font-size: 14.5px; font-weight: 800; text-decoration: none; transition: opacity .2s, transform .15s; box-shadow: 0 4px 16px rgba(249,168,37,.4); }
.btn-dashboard:hover { opacity: .9; transform: translateY(-2px); }

.right {
    flex: 1;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    background: #fff8f0;
}
.memphis-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

@media (max-width: 768px) {
    .right { display: none; }
    .left { width: 100%; padding: 40px 24px; }
}
</style>
</head>
<body>

<div class="left">
    <a class="logo-row" href="index.html">
        <img src="/images/logo-text.png" alt="Gomart" onerror="this.style.display='none'">
    </a>

    <div class="steps-bar">
        <div class="step-item active" id="si1"><div class="step-circle active" id="sc1"><span>1</span></div><div class="step-label">Sign Up</div></div>
        <div class="step-line" id="sl1"></div>
        <div class="step-item" id="si2"><div class="step-circle" id="sc2"><span>2</span></div><div class="step-label">Finish</div></div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- STEP 1 -->
    <div class="step-panel active" id="step1">
        <div class="step-heading"><h2>Buat akun kamu</h2><p>Isi data diri untuk mulai menggunakan Gomart.</p></div>

        <button class="btn-google" onclick="signUpWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.2 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6-6C34.5 6.3 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l6-6C34.5 6.3 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-1.9 13.6-5l-6.3-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.5-2.8-11.3-7L6.1 33.4C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.9 6l6.3 5.2C41.1 35.5 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
            Sign Up with Google
        </button>

        <div class="divider"><span></span></div>

        <div class="row2">
            <div class="field"><label>Nama Depan</label><input type="text" id="firstName" placeholder="Name"/></div>
            <div class="field"><label>Nama Belakang</label><input type="text" id="lastName" placeholder="Last Name"/></div>
        </div>
        <div class="field"><label>Email</label><input type="email" id="email" placeholder="Email"/></div>
        <div class="field">
            <label>Kata Sandi</label>
            <div class="pw-wrap">
                <input type="password" id="password" placeholder="Min. 8 karakter" oninput="checkStrength(this.value)" onkeydown="if(event.key==='Enter')goStep2()"/>
                <button class="pw-eye" type="button" onclick="togglePw('password',this)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <div class="pw-strength" id="pwStrength">
                <div class="sbars"><div class="sbar" id="b1"></div><div class="sbar" id="b2"></div><div class="sbar" id="b3"></div><div class="sbar" id="b4"></div></div>
                <div class="sbar-lbl" id="slabel"></div>
            </div>
        </div>
        <div class="field">
            <label>Konfirmasi Kata Sandi</label>
            <div class="pw-wrap">
                <input type="password" id="confirmPw" placeholder="Ulangi kata sandi" onkeydown="if(event.key==='Enter')goStep2()"/>
                <button class="pw-eye" type="button" onclick="togglePw('confirmPw',this)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>
        <div class="terms-row">
            <input type="checkbox" id="terms"/>
            <label for="terms">Saya setuju dengan <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a> Gomart</label>
        </div>
        <button class="btn-main" id="btn1" onclick="goStep2()"><span class="btn-label">Lanjutkan</span><div class="spinner"></div></button>
        <div class="alt-row">Sudah punya akun? <a href="signin.html">Masuk</a></div>
    </div>

    <!-- STEP 2 -->
    <div class="step-panel" id="step2">
        <div class="success-wrap">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2>Kamu siap!</h2>
            <p>Akun Gomart kamu sudah aktif. Yuk mulai kembangkan bisnis dengan alat bertenaga AI hari ini.</p>
            <a class="btn-dashboard" href="questionnaire.html">Mulai Sekarang →</a>
        </div>
    </div>
</div>

<div class="right">
    <svg class="memphis-svg" viewBox="0 0 700 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <rect width="700" height="900" fill="#fff8f0"/>
        <circle cx="80" cy="80" r="55" fill="none" stroke="#f9a825" stroke-width="5"/>
        <circle cx="620" cy="150" r="70" fill="none" stroke="#e65c00" stroke-width="4"/>
        <circle cx="350" cy="820" r="90" fill="none" stroke="#f9a825" stroke-width="6"/>
        <circle cx="650" cy="750" r="45" fill="none" stroke="#e65c00" stroke-width="3.5"/>
        <circle cx="30"  cy="500" r="60" fill="none" stroke="#f9a825" stroke-width="4"/>
        <circle cx="160" cy="200" r="14" fill="#f9a825"/>
        <circle cx="540" cy="310" r="10" fill="#e65c00"/>
        <circle cx="420" cy="660" r="18" fill="#f9a825" opacity=".6"/>
        <circle cx="90"  cy="720" r="12" fill="#e65c00"/>
        <circle cx="620" cy="500" r="22" fill="#f9a825" opacity=".5"/>
        <circle cx="280" cy="120" r="8"  fill="#e65c00"/>
        <circle cx="480" cy="80"  r="16" fill="#f9a825" opacity=".7"/>
        <polygon points="200,60 240,130 160,130" fill="none" stroke="#e65c00" stroke-width="4"/>
        <polygon points="580,400 620,460 540,460" fill="#f9a825" opacity=".5"/>
        <polygon points="100,600 140,550 180,600" fill="none" stroke="#f9a825" stroke-width="4"/>
        <polygon points="440,200 480,140 520,200" fill="#e65c00" opacity=".4"/>
        <rect x="500" y="60"  width="60" height="60" fill="none" stroke="#f9a825" stroke-width="4" transform="rotate(15 530 90)"/>
        <rect x="180" y="750" width="50" height="50" fill="#f9a825" opacity=".4" transform="rotate(-10 205 775)"/>
        <rect x="580" y="280" width="40" height="40" fill="none" stroke="#e65c00" stroke-width="3.5" transform="rotate(25 600 300)"/>
        <rect x="300" y="500" width="55" height="55" fill="none" stroke="#f9a825" stroke-width="4" transform="rotate(-20 327 527)"/>
        <path d="M0,250 Q87,220 175,250 Q262,280 350,250 Q437,220 525,250 Q612,280 700,250" fill="none" stroke="#f9a825" stroke-width="3" opacity=".5"/>
        <path d="M0,450 Q87,420 175,450 Q262,480 350,450 Q437,420 525,450 Q612,480 700,450" fill="none" stroke="#e65c00" stroke-width="3" opacity=".45"/>
        <path d="M0,650 Q87,620 175,650 Q262,680 350,650 Q437,620 525,650 Q612,680 700,650" fill="none" stroke="#f9a825" stroke-width="2.5" opacity=".4"/>
        <circle cx="350" cy="450" r="120" fill="#f9a825" opacity=".04"/>
        <circle cx="600" cy="200" r="100" fill="#e65c00" opacity=".04"/>
        <circle cx="100" cy="700" r="130" fill="#f9a825" opacity=".04"/>
    </svg>
</div>

<script>
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
}
function setStep(n) {
    [1,2].forEach(i => {
        document.getElementById('step'+i).classList.toggle('active', i===n);
        const si=document.getElementById('si'+i), sc=document.getElementById('sc'+i);
        si.classList.remove('active','done'); sc.classList.remove('active','done');
        if(i<n){si.classList.add('done');sc.classList.add('done');}
        if(i===n){si.classList.add('active');sc.classList.add('active');}
    });
    document.getElementById('sl1').classList.toggle('filled', n>1);
}
function goStep2() {
    const fn=document.getElementById('firstName').value.trim();
    const ln=document.getElementById('lastName').value.trim();
    const em=document.getElementById('email').value.trim();
    const pw=document.getElementById('password').value;
    const cpw=document.getElementById('confirmPw').value;
    const tc=document.getElementById('terms').checked;
    if(!fn||!ln){showToast('Mohon isi nama lengkap kamu.');return;}
    if(!em||!em.includes('@')){showToast('Mohon masukkan email yang valid.');return;}
    if(pw.length<8){showToast('Kata sandi minimal 8 karakter.');return;}
    if(pw!==cpw){showToast('Kata sandi tidak cocok.');return;}
    if(!tc){showToast('Mohon setujui Syarat & Ketentuan.');return;}
    const btn=document.getElementById('btn1');
    btn.classList.add('loading');btn.disabled=true;
    setTimeout(()=>{
        localStorage.setItem('gomart_user',JSON.stringify({email:em}));
        btn.classList.remove('loading');btn.disabled=false;setStep(2);
    },800);
}
function signUpWithGoogle() {
    const btn = document.querySelector('.btn-google');
    btn.disabled = true;
    btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid #ddd;border-top-color:#f9a825;border-radius:50%;animation:spin .7s linear infinite"></div> Menghubungkan...';
    setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.2 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6-6C34.5 6.3 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l6-6C34.5 6.3 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-1.9 13.6-5l-6.3-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.5-2.8-11.3-7L6.1 33.4C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.9 6l6.3 5.2C41.1 35.5 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg> Daftar dengan Google';
        window.location.href = 'questionnaire.html';
    }, 1200);
}
function togglePw(id,btn){
    const inp=document.getElementById(id),isText=inp.type==='text';
    inp.type=isText?'password':'text';
    btn.innerHTML=isText
        ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
}
function checkStrength(val){
    const el=document.getElementById('pwStrength'),lbl=document.getElementById('slabel');
    const bars=[1,2,3,4].map(i=>document.getElementById('b'+i));
    if(!val){el.classList.remove('show');return;}el.classList.add('show');
    let s=0;
    if(val.length>=8)s++;if(/[A-Z]/.test(val))s++;if(/[0-9]/.test(val))s++;if(/[^A-Za-z0-9]/.test(val))s++;
    const cls=['weak','weak','fair','strong'][s-1]||'weak';
    bars.forEach((b,i)=>{b.className='sbar'+(i<s?' '+cls:'');});
    lbl.textContent=['Terlalu pendek','Lemah','Cukup','Kuat'][s-1]||'';
    lbl.style.color=s===4?'#22c55e':s===3?'#f97316':'#ef4444';
}
</script>
</body>
</html>
