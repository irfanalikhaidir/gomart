<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Gomart</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
    background: #fff;
}

/* ── LEFT: FORM ── */
.left {
    width: 460px;
    flex-shrink: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 56px 60px;
    background: #fff;
    position: relative;
    z-index: 2;
    overflow-y: auto;
}

.logo-row {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; 
}
.logo-row img { height: 100px; object-fit: contain; }

h1 { font-size: 28px; font-weight: 900; color: #111; margin-bottom: 5px; letter-spacing: -.03em; }
.sub { font-size: 13.5px; color: #999; margin-bottom: 30px; }
.sub a { color: #f9a825; font-weight: 700; text-decoration: none; }
.sub a:hover { text-decoration: underline; }

.btn-google {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #f7f7f7; border: 1.5px solid #ebebeb; border-radius: 12px;
    padding: 13px; font-size: 14px; font-weight: 600; color: #333;
    cursor: pointer; text-decoration: none;
    transition: background .2s, transform .15s; margin-bottom: 20px;
}
.btn-google:hover { background: #efefef; transform: translateY(-1px); }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

.divider { display: flex; align-items: center; gap: 10px; color: #ddd; font-size: 12px; margin-bottom: 20px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }

.toast { display: none; background: rgba(220,50,50,.07); border: 1px solid rgba(220,50,50,.18); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #c0392b; margin-bottom: 12px; text-align: center; }
.toast.show { display: block; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; font-weight: 800; color: #999; margin-bottom: 6px; letter-spacing: .08em; text-transform: uppercase; }
.field input {
    width: 100%; padding: 13px 15px;
    background: #fafafa; border: 1.5px solid #eee;
    border-radius: 12px; font-size: 14px; color: #111; outline: none;
    font-family: Arial, sans-serif;
    transition: border-color .2s, box-shadow .2s, background .2s;
}
.field input::placeholder { color: #ccc; }
.field input:focus { background: #fff; border-color: #f9a825; box-shadow: 0 0 0 4px rgba(249,168,37,.12); }

.forgot { text-align: right; margin-bottom: 22px; }
.forgot a { font-size: 12px; color: #bbb; text-decoration: none; transition: color .15s; }
.forgot a:hover { color: #f9a825; }

.btn-main {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #f9a825, #e65c00);
    color: #fff; font-size: 15px; font-weight: 800;
    cursor: pointer; transition: opacity .2s, transform .15s, box-shadow .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 20px; box-shadow: 0 4px 18px rgba(249,168,37,.35);
}
.btn-main:hover { opacity: .9; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(249,168,37,.45); }
.btn-main:active { transform: translateY(0); }

.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
.btn-main.loading .btn-label { display: none; }
.btn-main.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.alt-row { text-align: center; font-size: 13px; color: #bbb; }
.alt-row a { color: #f9a825; font-weight: 700; text-decoration: none; }
.alt-row a:hover { text-decoration: underline; }

/* ── RIGHT: MEMPHIS DOODLE ── */
.right {
    flex: 1;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    background: #fff8f0;
}

.memphis-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

@media (max-width: 768px) {
    .right { display: none; }
    .left { width: 100%; padding: 48px 28px; }
}
</style>
</head>
<body>

<!-- LEFT: FORM -->
<div class="left">
    <a class="logo-row" href="index.html">
        <img src="/images/logo-text.png" alt="Gomart" onerror="this.style.display='none'">
    </a>

    <h1>Welcome back</h1>
    <p class="sub">No account? <a href="signup.html">Sign up free</a></p>

    <a class="btn-google" href="#" onclick="googleSignIn(event)">
        <svg viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
    </a>

    <div class="divider">or sign in with email</div>
    <div class="toast" id="toast"></div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" onkeydown="if(event.key==='Enter')signIn()" />
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="Enter your password" onkeydown="if(event.key==='Enter')signIn()" />
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="btn-main" id="signinBtn" onclick="signIn()">
        <span class="btn-label">Sign In</span>
        <div class="spinner"></div>
    </button>
    <div class="alt-row">New to Gomart? <a href="signup.html">Create a free account</a></div>
</div>

<script>
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
}
function signIn() {
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('passInput').value;
    const btn   = document.getElementById('signinBtn');
    if (!email || !pass)       { showToast('Please fill in all fields.'); return; }
    if (!email.includes('@'))  { showToast('Please enter a valid email.'); return; }
    if (pass.length < 6)       { showToast('Password must be at least 6 characters.'); return; }
    btn.classList.add('loading'); btn.disabled = true;
    setTimeout(() => {
        localStorage.setItem('gomart_user', JSON.stringify({ email }));
        btn.classList.remove('loading'); btn.disabled = false;
        window.location.href = 'index.html';
    }, 1200);
}
function googleSignIn(e) { e.preventDefault(); showToast('Google sign-in coming soon.'); }
if (localStorage.getItem('gomart_user')) window.location.href = 'index.html';
</script>
</body>
</html>
